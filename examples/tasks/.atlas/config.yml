handlers:
    - type: content
      patterns: ["**/*.md", "**/*.json"]

    - type: stat
      patterns: ["**/*.md", "**/*.json"]

    - type: frontmatter
      patterns: ["**/*.md"]
      prefix: ""

    - type: json
      patterns: ["**/*.json"]

    - type: shell
      bin: "{{ .workspace.atlas_path }}/handlers/task_id.sh"
      patterns: ["**/*.md"]

actions:
    - id: vi
      type: shell
      command: tmux popup -E -h 90% -w 90% -x C -y C "vi {{ .entry.path }}"

    - id: generate-tasks
      type: shell
      command: "{{ .AtlasPath }}/bin/tasks.js 100"

keymaps:
    - keys: [g]
      action: generate-tasks
      description: Generate tasks
      groups: [global]

    - keys: [o]
      action: vi
      description: open
      groups: [ext=md, ext=json]

tui:
    home_screen: task_table

screens:
    - id: task_table
      type: entry_table
      title: "Tasks"
      description: "List of tasks"
      query: "parent=tasks"
      open_screen: task_detail
      limit: 100
      columns:
          - id: id
            label: "ID"
            field: task_id
            width: 10

          - id: title
            label: "Title"
            field: title

          - id: status
            label: "Status"
            field: status
            width: 20

          - id: due_date
            label: "Due Date"
            field: due
            width: 30

    - id: task_detail
      type: custom
      title: "{{ .entry.title }}"
      components:
          - type: text
            content: "{{ .entry.content }}"
            cols: 220
            rows: 35

          - type: form
            values: "={{ .entry }}"
            fields:
                - id: title
                  label: "Title"

                - id: status
                  label: "Status"

                - id: due
                  label: "Due Date"

            x: 220
            cols: 50
            rows: 35
