handlers:
    - type: content
      patterns: ["**/*.md", "**/*.json"]

    - type: stat
      patterns: ["**/*.md", "**/*.json"]

    - type: frontmatter
      patterns: ["**/*.md"]
      prefix: ""

    - type: json
      patterns: ["**/*.json"]

    - type: shell
      bin: "{{ .workspace.atlas_path }}/handlers/task_id.js"
      patterns: ["**/*.md"]

actions:
    - id: vi
      type: shell
      command: tmux popup -E -h 90% -w 90% -x C -y C "vi {{ .EntryAbsolutePath }}"

    - id: generate-tasks
      type: shell
      command: "{{ .AtlasPath }}/bin/tasks.js 100"

keymaps:
    - keys: [g]
      action: generate-tasks
      description: Generate tasks
      groups: [global]

    - keys: [o]
      action: vi
      description: open
      groups: [ext=md, ext=json]

tui:
    home_screen: task_table

screens:
    - id: task_table
      type: entry_table
      title: "Tasks"
      description: "List of tasks"
      query: "parent=tasks"
      limit: 100
      columns:
          - id: id
            label: "ID"
            field: basename
            width: 10

          - id: title
            label: "Title"
            field: title

          - id: status
            label: "Status"
            field: status
            width: 20

          - id: due_date
            label: "Due Date"
            field: due
            width: 30

