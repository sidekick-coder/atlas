type: group
actions:
    - id: slug
      type: shell
      command: echo "{{ .value }}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]'

    - id: id
      type: shell
      command: 'bash "{{ .workspace.path }}/bin/create_id.sh" "{{ .workspace.path }}/tmp/task_id_counter"'

    - id: filename
      type: shell
      command: echo "tasks/{{ .id.output }}_{{ .slug.output }}.md"

    - id: create
      type: shell
      command: touch "{{ .workspace.path }}/{{ .filename.output }}"

    - type: entry-update
      path: "{{ .filename.output }}"
      values:
          title: "{{ .value }}"
          status: "open"
